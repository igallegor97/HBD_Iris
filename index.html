<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Convite 🎀</title>

<style>

@font-face {
    font-family: 'Boldins';
    src: url('Boldins.ttf');
}

@font-face {
    font-family: 'Odin';
    src: url('odin-rounded-bold.otf');
}

/* CUERPO */
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(180deg, #ffffff 0%, #ffc1da 60%, #ff9ec5 100%);
    font-family: 'Odin', sans-serif;
    overflow: hidden;
    position: relative;
}

/* SOBRE */
.envelope {
    width: 260px;
    height: 170px;
    background: #ffb6c1;
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    cursor: pointer;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    z-index: 2;
}

.tap-hint {
    position: absolute;
    bottom: -100px;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    animation: bounce 1.5s infinite;
}

.tap-hint img {
    width: 110px;
    margin-bottom: 5px;
}

.tap-hint p {
    font-family: 'Boldins', sans-serif;
    font-size: 16px;
    color: #ff4d88;
}

@keyframes bounce { 
    0%,100% { transform: translateY(0); } 
    50% { transform: translateY(-10px); } 
}

.flap {
    position: absolute;
    width: 100%;
    height: 100%;
    background: #ff8fab;
    clip-path: polygon(0 0, 50% 50%, 100% 0);
    transform-origin: top;
    transition: transform 1s;
}

/* CARTA GRANDE */
.letter {
    position: fixed;
    width: 90vw;
    max-width: 420px;

    height: auto;
    max-height: 80vh;

    top: 50%;
    left: 50%;

    transform: translate(-50%, -50%) scale(0.6);
    transform-origin: center;

    border-radius: 30px;
    padding: 25px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.25);
    opacity: 0;
    transition: none;

    text-align: center;
    overflow-y: auto;
    padding-bottom: 80px;
    z-index: 5; /* encima de todo */
}

.letter::-webkit-scrollbar {
    display: none;
}

/* ABRIR */
.open .flap {
    transform: rotateX(180deg);
}

.open .letter {
    transform: translate(-50%, -50%) scale(1);
    opacity: 1;
    animation: popIn 0.6s ease forwards;
}

@keyframes popIn {
    0%   { transform: translate(-50%, -40%) scale(0.7); opacity: 0; }
    60%  { transform: translate(-50%, -55%) scale(1.05); }
    100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
}

/* TEXTO */
h1 {
    font-family: 'Boldins', sans-serif;
    font-size: 28px;
    color: #ff4d88;
    margin-bottom: 10px;
}

p {
    color: #555;
    font-size: 15px;
}

/* GALERÍA GRANDE */
.gallery {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin: 15px 0;
}

.gallery img {
    width: 100%;
    height: 120px;
    border-radius: 15px;
    object-fit: cover;
    border: 2px solid #ffb6c1;
}

/* BOTÓN */
button {
    margin-top: 15px;
    padding: 12px 18px;
    border: none;
    border-radius: 25px;
    background: #ff4d88;
    color: white;
    font-family: 'Odin', sans-serif;
    font-weight: bold;
    cursor: pointer;
}

/* STICKERS */
.sticker {
    position: absolute;
    width: 70px;
    top: 15px;
    animation: float 3s ease-in-out infinite;
}

.left-sticker {
    left: 10px;
}

.right-sticker {
    right: 10px;
}

/* GLOBOS */
.balloon {
    position: absolute;
    bottom: -100px;
    width: 40px;
    animation: rise 6s linear infinite;
}

@keyframes rise {
    0% { transform: translateY(0); opacity:1;}
    100% { transform: translateY(-800px); opacity:0;}
}

/* GLITTER */
.glitter {
    position: absolute;
    width: 100%;
    height: 100%;
    pointer-events: none;
}

.sparkle {
    position: absolute;
    width: 6px;
    height: 6px;
    background: white;
    border-radius: 50%;
    opacity: 0.8;
    animation: sparkle 3s linear infinite;
}

@keyframes sparkle {
    0% { transform: translateY(0); opacity:1; }
    100% { transform: translateY(-500px); opacity:0; }
}

.confetti {
    position: absolute;
    width: 10px;
    height: 10px;
    opacity: 0.9;
    border-radius: 3px;
    z-index: 9999;
    pointer-events: none;
}

@keyframes confettiExplosion {
    0% {
        transform: translate(0,0) rotate(0);
        opacity: 1;
    }
    100% {
        transform: translate(var(--x), var(--y)) rotate(720deg);
        opacity: 0;
    }
}

</style>
</head>

<body>

<audio id="openSound">
  <source src="happy-birthday-tropical-music-intro-ra-music-1-1-00-22.mp3" type="audio/mpeg">
</audio>

<div class="glitter" id="glitter"></div>

<div class="envelope" onclick="openEnvelope(this)">
    <div class="flap"></div>

<div class="tap-hint"> 
    <img src="HKbombas.png">
    <p>Tap para abrir 🎀</p> 
</div>

    <div class="letter">

        <!-- STICKERS -->
        <img class="sticker left-sticker" src="caritaHK.png">
        <img class="sticker right-sticker" src="caritaHK.png">

        <h1>Os 3 anos da Íris</h1>

        <p>Venha celebrar comigo este dia mágico 💕</p>

        <p><b>Data:</b> 13 de Junho</p>
        <p><b>Hora:</b> 12h</p>
        <p><b>Lugar:</b> Rua Dom Pedro II, 255, Centro Americana 🏡</p>

        <!-- GALERÍA -->
        <div class="gallery">
            <img src="foto1.jpeg">
            <img src="foto2.jpeg">
            <img src="foto3.jpeg">
            <img src="foto4.jpeg">
            <img src="foto5.jpeg">
            <img src="foto6.jpeg">
        </div>

        <button onclick="confirmar(event)">Confirmar presença 🎀</button>

    </div>
</div>

<script>

/* GLOBOS */
function createBalloons(){
    for(let i=0;i<10;i++){
        let b = document.createElement("img");
        b.src = "bombascora.png";
        b.className = "balloon";
        b.style.left = Math.random()*window.innerWidth + "px";
        b.style.animationDuration = (4 + Math.random()*3) + "s";
        document.body.appendChild(b);

        setTimeout(()=>b.remove(),7000);
    }
}

/* CONFETTI */    
function createConfetti(){

    const colors = ["#ff4d88","#ff9ec5","#ffd6e8","#ffffff","#ff85a2","#ffc2d1"];

    let envelope = document.querySelector(".envelope");
    let rect = envelope.getBoundingClientRect();

    let originX = rect.left + rect.width / 2;
    let originY = rect.top + rect.height / 2;

    for(let i=0; i<120; i++){

        let c = document.createElement("div");
        c.className = "confetti";

        c.style.left = originX + "px";
        c.style.top = originY + "px";
        c.style.background = colors[Math.floor(Math.random()*colors.length)];

        let angle = Math.random() * 2 * Math.PI;
        let distance = 200 + Math.random()*200;

        let x = Math.cos(angle) * distance;
        let y = Math.sin(angle) * distance;

        c.style.setProperty('--x', x + "px");
        c.style.setProperty('--y', y + "px");

        c.style.animation = "confettiExplosion 1.5s ease-out forwards";

        document.body.appendChild(c);

        setTimeout(()=>c.remove(),1500);
    }
}

/* ABRIR SOBRE */
function openEnvelope(el) {
    el.classList.toggle("open");
    document.getElementById("openSound").play();
    createBalloons();
    createConfetti();

    let hint = document.querySelector(".tap-hint");
    if(hint) hint.style.display = "none";
}

/* WHATSAPP */
function confirmar(e){
    e.stopPropagation();
    let mensaje = encodeURIComponent("Olá! Confirmo presença na festa da Íris 🎀");
    window.open("https://wa.me/+5511976613486?text=" + mensaje, "_blank");
}

/* GLITTER */
function createGlitter(){
    for(let i=0;i<30;i++){
        let s = document.createElement("div");
        s.className = "sparkle";
        s.style.left = Math.random()*window.innerWidth + "px";
        s.style.top = Math.random()*window.innerHeight + "px";
        s.style.animationDuration = (2 + Math.random()*2) + "s";
        document.body.appendChild(s);

        setTimeout(()=>s.remove(),3000);
    }
}

setInterval(createGlitter, 800);

</script>

</body>
</html>
