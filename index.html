<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Convite 🎀</title>

<style>

@font-face {
    font-family: 'Boldins';
    src: url('Boldins.ttf');
}

@font-face {
    font-family: 'Odin';
    src: url('odin-rounded-bold.otf');
}

body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(180deg, #ffffff 0%, #ffc1da 60%, #ff9ec5 100%);
    font-family: 'Odin', sans-serif;
    overflow: hidden;
    position: relative;
}

/* SOBRE */
.envelope {
    width: 260px;
    height: 170px;
    left: 50%;
    bottom: 120px;
    transform: translateX(-50%);
    background: #ffb6c1;
    position: absolute;
    cursor: pointer;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    z-index: 2;
}

.tap-hint {
    position: absolute;
    bottom: -130px;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    animation: bounce 1.5s infinite;
}

.tap-hint img {
    width: 110px;
    margin-bottom: 5px;
}

.tap-hint p {
    font-family: 'Boldins', cursive;
    font-size: 16px;
    color: #ff4d88;
}

@keyframes bounce { 
    0%,100% { transform: translateY(0); } 
    50% { transform: translateY(-10px); } 
}

.flap {
    position: absolute;
    width: 100%;
    height: 100%;
    background: #ff8fab;
    clip-path: polygon(0 0, 50% 50%, 100% 0);
    transform-origin: top;
    transition: transform 1s;
}

/* CARTA GRANDE */
.letter {
    position: absolute;
    width: 90vw;
    max-width: 420px;
    height: 80vh;
    background: white;
    top: 0;
    left: 50%;
    transform: translate(-50%, 180px) scale(0.7);
    border-radius: 30px;
    padding: 25px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.25);
    opacity: 0;
    transition: all 1.2s cubic-bezier(.68,-0.55,.27,1.55);
    text-align: center;
    overflow-y: auto;
    background: linear-gradient(180deg, #ffffff 0%, #ffc1da 60%, #ff9ec5 100%);
}

/* ABRIR */
.open .flap {
    transform: rotateX(180deg);
}

.open .letter {
    transform: translate(-50%, -320px) scale(1);
    opacity: 1;
}

/* TEXTO */
h1 {
    font-family: 'Boldins', cursive;
    font-size: 28px;
    color: #ff4d88;
    margin-bottom: 10px;
}

p {
    color: #555;
    font-size: 15px;
}

/* GALERÍA GRANDE */
.gallery {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin: 15px 0;
}

.gallery img {
    width: 100%;
    height: 120px;
    border-radius: 15px;
    object-fit: cover;
    border: 2px solid #ffb6c1;
}

/* BOTÓN */
button {
    margin-top: 15px;
    padding: 12px 18px;
    border: none;
    border-radius: 25px;
    background: #ff4d88;
    color: white;
    font-family: 'Odin', sans-serif;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: #ff1a66;
}

/* STICKERS */
.sticker {
    position: absolute;
    width: 70px;
    animation: float 3s ease-in-out infinite;
    top: 10px; /* antes negativo */
}

@keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}

/* GLOBOS */
.balloon {
    position: absolute;
    bottom: -100px;
    width: 40px;
    animation: rise 6s linear infinite;
}

@keyframes rise {
    0% { transform: translateY(0); opacity:1;}
    100% { transform: translateY(-800px); opacity:0;}
}

/* GLITTER */
.glitter {
    position: absolute;
    width: 100%;
    height: 100%;
    pointer-events: none;
}

/* CONFETTI */
.confetti {
    position: absolute;
    width: 8px;
    height: 12px;
    background: red;
    opacity: 0.8;
    animation: confettiFall 3s linear forwards;
}

@keyframes confettiFall {
    0% {
        transform: translateY(0) rotate(0);
    }
    100% {
        transform: translateY(600px) rotate(720deg);
        opacity: 0;
    }
}

.sparkle {
    position: absolute;
    width: 6px;
    height: 6px;
    background: white;
    border-radius: 50%;
    opacity: 0.8;
    animation: sparkle 3s linear infinite;
}

@keyframes sparkle {
    0% { transform: translateY(0); opacity:1; }
    100% { transform: translateY(-500px); opacity:0; }
}

</style>
</head>

<body>

<audio id="openSound">
  <source src="happy-birthday-tropical-music-intro-ra-music-1-1-00-22.mp3" type="audio/mpeg">
</audio>

<div class="glitter" id="glitter"></div>

<div class="envelope" onclick="openEnvelope(this)">
    <div class="flap"></div>

<div class="tap-hint"> 
    <img class="sticker" src="HKbombas.png">
    <p>Tap para abrir 🎀</p> 
</div>

    <div class="letter">

        <!-- STICKERS -->
        <img class="sticker" style="top:-20px; left:-10px;" src="caritaHK.png">
        <img class="sticker" style="top:-20px; right:-10px;" src="caritaHK.png">

        <h1>Os 3 anos da Íris 🎀</h1>

        <p>Venha celebrar comigo este dia mágico 💕</p>

        <p><b>Data:</b> 13 de Junho</p>
        <p><b>Hora:</b> 12h</p>
        <p><b>Lugar:</b> Rua Dom Pedro II, 255, Centro Americana 🏡</p>

        <!-- GALERÍA -->
        <div class="gallery">
            <img src="foto1.jpg">
            <img src="foto2.jpg">
            <img src="foto3.jpg">
            <img src="foto4.jpg">
            <img src="foto5.jpg">
            <img src="foto6.jpg">
        </div>

        <button onclick="confirmar(event)">Confirmar presença 🎀</button>

    </div>
</div>

<script>
function openEnvelope(el) {
    el.classList.toggle("open");
    document.getElementById("openSound").play();
    createBalloons();
    createConfetti();

    let hint = document.querySelector(".tap-hint");
    if(hint) hint.style.display = "none";
}

function createConfetti(){
    const colors = ["#ff4d88","#ff9ec5","#ffd6e8","#ffffff"];

    for(let i=0;i<80;i++){
        let c = document.createElement("div");
        c.className = "confetti";
        c.style.left = (window.innerWidth/2) + "px";
        c.style.top = "40%";
        c.style.background = colors[Math.floor(Math.random()*colors.length)];

        let angle = Math.random()*360;
        let distance = Math.random()*300;

        c.style.transform = `translate(${Math.cos(angle)*distance}px, ${Math.sin(angle)*distance}px)`;

        document.body.appendChild(c);

        setTimeout(()=>c.remove(),3000);
    }
}

/* GLOBOS */
function createBalloons(){
    for(let i=0;i<10;i++){
        let b = document.createElement("img");
        b.src = "bombascora.png";
        b.className = "balloon";
        b.style.left = Math.random()*window.innerWidth + "px";
        b.style.animationDuration = (4 + Math.random()*3) + "s";
        document.body.appendChild(b);

        setTimeout(()=>b.remove(),7000);
    }
}

/* WHATSAPP */
function confirmar(e){
    e.stopPropagation();
    let mensaje = encodeURIComponent("Olá! Confirmo presença na festa da Íris 🎀");
    window.open("https://wa.me/11976613486?text=" + mensaje, "_blank");
}

/* GLITTER */
function createGlitter(){
    for(let i=0;i<30;i++){
        let s = document.createElement("div");
        s.className = "sparkle";
        s.style.left = Math.random()*window.innerWidth + "px";
        s.style.top = Math.random()*window.innerHeight + "px";
        s.style.animationDuration = (2 + Math.random()*2) + "s";
        document.body.appendChild(s);

        setTimeout(()=>s.remove(),3000);
    }
}

setInterval(createGlitter, 800);

</script>

</body>
</html>
